<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Aristoclean Inventory</title>
  <style>
    :root {
      --accent: #1a5c3a;
      --accent-hover: #134a2e;
      --border: #e0ddd6;
      --radius: 6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 1rem;
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand h1 {
      font-family: Georgia, serif;
      font-size: 1.6rem;
      color: var(--accent);
      font-weight: 700;
    }
    .brand p { font-size: 0.8rem; color: #888; margin-top: 0.3rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #666; margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.6rem 0.75rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 0.9rem; font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,92,58,0.12); }
    button {
      width: 100%; padding: 0.7rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 0.88rem; font-weight: 600; font-family: inherit;
      cursor: pointer; letter-spacing: 0.03em;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }
    button:hover { background: var(--accent-hover); }
    .error { font-size: 0.82rem; color: #c0392b; margin-top: 0.4rem; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <h1>Aristoclean</h1>
      <p>Inventory Manager</p>
    </div>
    <div class="card">
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <p class="error">Invalid username or password. Please try again.</p>
        {% endif %}
        <div class="form-group">
          <label for="id_username">Username</label>
          <input type="text" name="username" id="id_username" autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <label for="id_password">Password</label>
          <input type="password" name="password" id="id_password" autocomplete="current-password">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
