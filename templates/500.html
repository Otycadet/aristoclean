{% extends "base.html" %}
{% block title %}Server Error - Aristoclean{% endblock %}
{% block content %}
<div class="card" style="max-width:720px; margin:3rem auto; text-align:center;">
  <div class="card-title">500 Error</div>
  <h1 style="margin-bottom:0.75rem;">Something Went Wrong</h1>
  <p style="color:var(--muted); margin-bottom:1.5rem;">
    The server hit an unexpected error. Please try again shortly.
  </p>
  <a href="{% url 'dashboard' %}" class="btn btn-primary">Back to Dashboard</a>
</div>
{% endblock %}
